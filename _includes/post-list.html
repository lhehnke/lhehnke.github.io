<div class="notelist">
    {% for post in site.posts %}
    <ul class="listnotes list-unstyled">
      <li><span>{{ post.date | date_to_string }} &raquo;</span> <a href="{{ post.url }}">{{ post.title }}</a></li>
    </ul>
    {% endfor %}
    
    <p class="pull-right">
				<a href="https://www.r-bloggers.com/" target="_blank"><img  class="img" alt="RBloggers" src="https://lhehnke.github.io/img/rbloggers.png"></a>	
		<a href="https://lhehnke.github.io/feed.xml" target="_blank"><img  class="img" alt="Feed" src="https://lhehnke.github.io/img/feed_blue.png"></a></p>
		
</div><!--/.notelist -->
