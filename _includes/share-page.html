<div class="share-page">

    <div class="share-buttons">
      
              <a  href="https://twitter.com/intent/tweet?text={{ page.title | url_encode }}+{{ site.url }}{{ page.url }}"
            onclick="window.open(this.href, 'pop-up', 'left=20,top=20,width=500,height=500,toolbar=1,resizable=0'); return false;"
            title="Share on Twitter" style="text-decoration:none">
            <i class="fa fa-twitter share-button" aria-hidden="true"></i>
        </a>

      
        <a  href="https://www.facebook.com/sharer/sharer.php?u={{ site.url }}{{ page.url }}"
            onclick="window.open(this.href, 'pop-up', 'left=20,top=20,width=500,height=500,toolbar=1,resizable=0'); return false;"
            title="Share on Facebook" style="text-decoration:none">
            <i class="fa fa-facebook-official share-button" aria-hidden="true"></i>
        </a>


        <a  href="https://plus.google.com/share?url={{ site.url }}{{ page.url }}"
            onclick="window.open(this.href, 'pop-up', 'left=20,top=20,width=500,height=500,toolbar=1,resizable=0'); return false;"
            title="Share on Google+" style="text-decoration:none">
            <i class="fa fa-google-plus share-button" aria-hidden="true"></i>
        </a>


        <a  href="https://www.linkedin.com/shareArticle?mini=true&url={{ site.url }}{{ page.url }}"
            onclick="window.open(this.href, 'pop-up', 'left=20,top=20,width=500,height=500,toolbar=1,resizable=0'); return false;"
            title="Share on LinkedIn" style="text-decoration:none">
            <i class="fa fa-linkedin share-button" aria-hidden="true"></i>
        </a>

    </div>

</div>

<style>

    font-size: 14px;
}

    margin-bottom: 10px;

.share-buttons {
}

/* Each button */
.share-button {
    margin: 0px;
    margin-bottom: 10px;
    margin-right: 3px;
    border: none;
    padding: 5px 10px 5px 10px;
    border-radius: 4px; 
}
.share-button:hover {
    opacity: 1;
    color: #ffffff;
}

/* Facebook button */
.fa-facebook-official {
    color: #3b5998;
}
.fa-facebook-official:hover {
    background-color: #3b5998;
}

/* Twitter button */
.fa-twitter {
    color: #55acee;
}
.fa-twitter:hover {
    background-color: #55acee;
}

/* Google-PLus button */
.fa-google-plus {
    color: #dd4b39;
}
.fa-google-plus:hover {
    background-color: #dd4b39;
}


/* LinkedIn button */
.fa-linkedin {
    color: #007bb5;
}
.fa-linkedin:hover {

}

/* Email button */
.fa-envelope {

}
.fa-envelope:hover {

}
</style>
